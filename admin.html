<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Framd Admin — Inquiries</title>
  <link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #080808;
      --white: #F2EDE8;
      --orange: #FF4D00;
      --grey: #141414;
      --grey-mid: #1E1E1E;
      --grey-card: #1A1A1A;
      --text-muted: rgba(242,237,232,0.5);
      --border: rgba(242,237,232,0.08);
      --green: #00C864;
    }
    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Cabinet Grotesk', sans-serif;
      min-height: 100vh;
    }

    /* ─── LOGIN ─── */
    #loginScreen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .login-box {
      width: 100%;
      max-width: 400px;
      border: 1px solid var(--border);
      padding: 2.5rem;
      background: var(--grey);
    }
    .login-logo {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }
    .login-logo span { color: var(--orange); }
    .login-sub {
      color: var(--text-muted);
      font-size: 0.8rem;
      margin-bottom: 2rem;
      letter-spacing: 0.05em;
    }
    .login-label {
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      display: block;
      margin-bottom: 0.5rem;
    }
    .login-input {
      width: 100%;
      background: var(--black);
      border: 1px solid var(--border);
      color: var(--white);
      font-family: 'Cabinet Grotesk', sans-serif;
      font-size: 1rem;
      padding: 0.9rem 1rem;
      outline: none;
      transition: border-color 0.3s;
      margin-bottom: 1.25rem;
    }
    .login-input:focus { border-color: var(--orange); }
    .login-btn {
      width: 100%;
      background: var(--orange);
      color: var(--white);
      border: none;
      padding: 0.9rem;
      font-family: 'Cabinet Grotesk', sans-serif;
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-btn:hover { background: #ff6620; }
    .login-error {
      color: var(--orange);
      font-size: 0.8rem;
      margin-top: 0.75rem;
      display: none;
    }

    /* ─── DASHBOARD ─── */
    #dashboard { display: none; }

    .dash-nav {
      background: var(--grey);
      border-bottom: 1px solid var(--border);
      padding: 0 clamp(1.5rem, 5vw, 3rem);
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .dash-logo {
      font-size: 1.3rem;
      font-weight: 900;
      letter-spacing: 0.08em;
    }
    .dash-logo span { color: var(--orange); }
    .dash-nav-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .dash-nav-right a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .dash-nav-right a:hover { color: var(--white); }
    .logout-btn {
      background: var(--orange);
      color: var(--white);
      border: none;
      padding: 0.5rem 1.1rem;
      font-family: 'Cabinet Grotesk', sans-serif;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    .logout-btn:hover { background: #ff6620; }

    .dash-body { padding: clamp(2rem, 4vw, 3rem) clamp(1.5rem, 5vw, 3rem); }

    /* Stats */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    .stat-card {
      background: var(--grey-card);
      border: 1px solid var(--border);
      padding: 1.5rem;
    }
    .stat-card-num {
      font-size: 2.5rem;
      font-weight: 900;
      color: var(--orange);
      line-height: 1;
      margin-bottom: 0.3rem;
    }
    .stat-card-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* Controls */
    .dash-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .dash-title {
      font-size: 1.3rem;
      font-weight: 800;
    }
    .filter-btns {
      display: flex;
      gap: 0.5rem;
    }
    .filter-btn {
      background: var(--grey-card);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.4rem 0.9rem;
      font-family: 'Cabinet Grotesk', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--orange);
      border-color: var(--orange);
      color: var(--white);
    }

    /* Table */
    .inquiries-table {
      width: 100%;
      border-collapse: collapse;
    }
    .inquiries-table th {
      background: var(--grey-mid);
      padding: 0.85rem 1rem;
      text-align: left;
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }
    .inquiries-table td {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
      vertical-align: top;
    }
    .inquiry-row { transition: background 0.2s; }
    .inquiry-row:hover { background: rgba(255,77,0,0.04); }
    .inquiry-row.unread td:first-child { border-left: 2px solid var(--orange); }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .badge-unread { background: rgba(255,77,0,0.15); color: var(--orange); }
    .badge-read { background: rgba(242,237,232,0.06); color: var(--text-muted); }

    .inquiry-msg {
      color: var(--text-muted);
      font-size: 0.82rem;
      max-width: 300px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .action-btns {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .action-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.3rem 0.7rem;
      font-family: 'Cabinet Grotesk', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-btn:hover { border-color: var(--orange); color: var(--orange); }
    .action-btn.delete:hover { border-color: #ff4444; color: #ff4444; }

    .empty-state {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--text-muted);
    }
    .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty-text { font-size: 1rem; font-weight: 700; }
    .empty-sub { font-size: 0.82rem; margin-top: 0.5rem; }

    .loading-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* Mobile table */
    @media (max-width: 768px) {
      .inquiries-table thead { display: none; }
      .inquiries-table td {
        display: block;
        padding: 0.5rem 1rem;
      }
      .inquiry-row td:first-child { padding-top: 1rem; }
      .inquiry-row td:last-child { padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="loginScreen">
    <div class="login-box">
      <div class="login-logo">FRAMD<span>.</span></div>
      <div class="login-sub">Admin Dashboard — Authorized Access Only</div>
      <label class="login-label">Password</label>
      <input type="password" class="login-input" id="loginInput" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()" />
      <button class="login-btn" onclick="login()">Enter Dashboard →</button>
      <div class="login-error" id="loginError">Wrong password. Try again.</div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">
    <nav class="dash-nav">
      <div class="dash-logo">FRAMD<span>.</span> <span style="font-size:0.75rem;color:var(--text-muted);font-weight:500;letter-spacing:0.1em;"> ADMIN</span></div>
      <div class="dash-nav-right">
        <a href="/">← Back to Site</a>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </nav>

    <div class="dash-body">
      <div class="stats-row" id="statsRow">
        <div class="stat-card">
          <div class="stat-card-num" id="statTotal">—</div>
          <div class="stat-card-label">Total Inquiries</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-num" id="statUnread">—</div>
          <div class="stat-card-label">Unread</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-num" id="statToday">—</div>
          <div class="stat-card-label">Today</div>
        </div>
      </div>

      <div class="dash-controls">
        <div class="dash-title">All Inquiries</div>
        <div class="filter-btns">
          <button class="filter-btn active" onclick="filterInquiries('all', this)">All</button>
          <button class="filter-btn" onclick="filterInquiries('unread', this)">Unread</button>
          <button class="filter-btn" onclick="filterInquiries('read', this)">Read</button>
        </div>
      </div>

      <div id="tableWrap">
        <div class="loading-state">Loading inquiries...</div>
      </div>
    </div>
  </div>

  <script>
    let token = '';
    let allInquiries = [];
    let currentFilter = 'all';

    async function login() {
      const pw = document.getElementById('loginInput').value;
      document.getElementById('loginError').style.display = 'none';
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw })
        });
        const data = await res.json();
        if (data.success) {
          token = data.token;
          document.getElementById('loginScreen').style.display = 'none';
          document.getElementById('dashboard').style.display = 'block';
          loadDashboard();
        } else {
          document.getElementById('loginError').style.display = 'block';
        }
      } catch (e) {
        document.getElementById('loginError').textContent = 'Server error. Make sure the server is running.';
        document.getElementById('loginError').style.display = 'block';
      }
    }

    function logout() {
      token = '';
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('loginInput').value = '';
    }

    async function loadDashboard() {
      await loadStats();
      await loadInquiries();
    }

    async function loadStats() {
      const res = await fetch('/api/admin/stats', { headers: { Authorization: 'Bearer ' + token } });
      const data = await res.json();
      document.getElementById('statTotal').textContent = data.total;
      document.getElementById('statUnread').textContent = data.unread;

      // Count today
      const today = new Date().toDateString();
      const todayCount = allInquiries.filter(i => new Date(i.created_at).toDateString() === today).length;
      document.getElementById('statToday').textContent = todayCount;
    }

    async function loadInquiries() {
      const res = await fetch('/api/admin/inquiries', { headers: { Authorization: 'Bearer ' + token } });
      allInquiries = await res.json();
      renderTable(allInquiries);

      // Update today count now that we have data
      const today = new Date().toDateString();
      const todayCount = allInquiries.filter(i => {
        return new Date(i.created_at + 'Z').toDateString() === today;
      }).length;
      document.getElementById('statToday').textContent = todayCount;
    }

    function filterInquiries(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (filter === 'all') renderTable(allInquiries);
      else if (filter === 'unread') renderTable(allInquiries.filter(i => !i.read));
      else renderTable(allInquiries.filter(i => i.read));
    }

    function renderTable(data) {
      const wrap = document.getElementById('tableWrap');
      if (!data.length) {
        wrap.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <div class="empty-text">No inquiries yet</div>
            <div class="empty-sub">When someone fills out the contact form, it'll show here.</div>
          </div>`;
        return;
      }

      const rows = data.map(i => `
        <tr class="inquiry-row ${i.read ? '' : 'unread'}" id="row-${i.id}">
          <td>
            <div style="font-weight:800;font-size:0.88rem;">${escHtml(i.name)}</div>
            <div style="color:var(--text-muted);font-size:0.78rem;margin-top:0.2rem;">${escHtml(i.email)}</div>
          </td>
          <td>
            <span class="badge ${i.read ? 'badge-read' : 'badge-unread'}">${i.read ? 'Read' : 'New'}</span>
          </td>
          <td style="color:var(--text-muted);font-size:0.8rem;">${escHtml(i.service || '—')}</td>
          <td style="color:var(--text-muted);font-size:0.8rem;">${escHtml(i.budget || '—')}</td>
          <td><div class="inquiry-msg">${escHtml(i.message)}</div></td>
          <td style="color:var(--text-muted);font-size:0.75rem;white-space:nowrap;">${formatDate(i.created_at)}</td>
          <td>
            <div class="action-btns">
              ${!i.read ? `<button class="action-btn" onclick="markRead(${i.id})">Mark Read</button>` : ''}
              <button class="action-btn" onclick="replyEmail('${escHtml(i.email)}', '${escHtml(i.name)}')">Reply</button>
              <button class="action-btn delete" onclick="deleteInquiry(${i.id})">Delete</button>
            </div>
          </td>
        </tr>
      `).join('');

      wrap.innerHTML = `
        <table class="inquiries-table">
          <thead>
            <tr>
              <th>Contact</th>
              <th>Status</th>
              <th>Service</th>
              <th>Budget</th>
              <th>Message</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    async function markRead(id) {
      await fetch(`/api/admin/inquiries/${id}/read`, {
        method: 'PATCH',
        headers: { Authorization: 'Bearer ' + token }
      });
      await loadDashboard();
    }

    async function deleteInquiry(id) {
      if (!confirm('Delete this inquiry? This cannot be undone.')) return;
      await fetch(`/api/admin/inquiries/${id}`, {
        method: 'DELETE',
        headers: { Authorization: 'Bearer ' + token }
      });
      await loadDashboard();
    }

    function replyEmail(email, name) {
      window.location.href = `mailto:${email}?subject=Re: Your inquiry to Framd.co&body=Hi ${name},%0D%0A%0D%0AThanks for reaching out! `;
    }

    function formatDate(dt) {
      if (!dt) return '—';
      const d = new Date(dt);
      return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) +
        ' ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    }

    function escHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
